description: Intraday NSE strategy with Kronos time-series prediction overlay
goal:
  max_drawdown_pct: -8.0
  min_eval_trades: 20
  min_sharpe: 1.2
  min_trades_per_change: 30
  reflection_every_n_trades: 5
  target_return_pct: 5.0
params:
  buy_enabled: true
  cooldown_seconds: 1800
  kronos_bonus_align: 1.1
  kronos_confidence_weight: 0.35
  kronos_enabled: true
  kronos_exit_threshold: -0.008
  kronos_matrix_bonus_max: 4    # max matrix bonus for an aligned Kronos forecast (scaled by magnitude); 0 disables
  kronos_min_predicted_move: 0.003
  kronos_penalty_conflict: 0.5
  kronos_pred_len: 10
  kronos_sample_count: 1
  kronos_temperature: 0.5
  market_close_exit_minutes: 15
  market_open_skip_minutes: 0
  max_concurrent_positions: 3
  max_consecutive_losses: 3
  max_daily_loss_pct: 2.0
  max_daily_signals: 10
  max_daily_trades: 5
  max_signals_per_stock_per_day: 1
  max_trade_duration_minutes: 180
  min_adx_trending: 22
  min_confidence: 82
  min_prefilter_atr_pct: 0.3
  min_prefilter_volume_ratio: 0.3
  min_rr_ratio: 1.9000000000000001
  min_volume_ratio_trending: 0.3
  partial_profit_pct: 0.0
  position_confidence_scalar: 1.0
  risk_per_trade_pct: 2.0
  rsi_ob_limit: 67
  rsi_os_limit: 30
  same_direction_cooldown: 1800
  trailing_sl_activation_pct: 1.0
  trailing_sl_distance_atr: 1.5
version: kronos-v19
